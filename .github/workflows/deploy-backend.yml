name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: true

env:
  BACKEND_DEPLOY_PATH: ${{ secrets.BACKEND_DEPLOY_PATH }}
  BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE }}
  BACKEND_RUN_MIGRATIONS: ${{ secrets.BACKEND_RUN_MIGRATIONS }}
  BACKEND_NODE_ENV: ${{ secrets.BACKEND_NODE_ENV }}
  BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
  BACKEND_UPLOAD_STORAGE_DIR: ${{ secrets.BACKEND_UPLOAD_STORAGE_DIR }}
  ASSISTANT_LLM_ENABLED: ${{ vars.ASSISTANT_LLM_ENABLED }}
  ASSISTANT_LLM_BASE_URL: ${{ secrets.ASSISTANT_LLM_BASE_URL}}
  ASSISTANT_LLM_MODEL: ${{ vars.ASSISTANT_LLM_MODEL }}
  ASSISTANT_FALLBACK_ENABLED: ${{ vars.ASSISTANT_FALLBACK_ENABLED }}
  ASSISTANT_FALLBACK_MODEL: ${{ vars.ASSISTANT_FALLBACK_MODEL }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

jobs:
  deploy:
    name: Deploy backend VM
    runs-on: [self-hosted, backend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to server
        run: |
          test -n "$BACKEND_DEPLOY_PATH"
          test -n "$BACKEND_DATABASE_URL"

          # Create new deployment directory
          mkdir -p "$BACKEND_DEPLOY_PATH"

          # Copy built application to deployment directory
          echo "Copying application files..."
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env*' \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.ruff_cache' \
            ./ "$BACKEND_DEPLOY_PATH/"

          # Create .env file in deployment directory. Written from secrets/vars
          # at deploy time and never committed; locked to the runner user.
          echo "Creating .env file in deployment directory..."
          ENV_FILE="$BACKEND_DEPLOY_PATH/backend/.env"
          install -m 600 /dev/null "$ENV_FILE"
          printf 'NODE_ENV=%s\nDATABASE_URL=%s\nUPLOAD_STORAGE_DIR=%s\nASSISTANT_LLM_ENABLED=%s\nASSISTANT_LLM_BASE_URL=%s\nASSISTANT_LLM_MODEL=%s\nASSISTANT_FALLBACK_ENABLED=%s\nASSISTANT_FALLBACK_MODEL=%s\nDEEPSEEK_API_KEY=%s\n' \
            "$BACKEND_NODE_ENV" \
            "$BACKEND_DATABASE_URL" \
            "$BACKEND_UPLOAD_STORAGE_DIR" \
            "$ASSISTANT_LLM_ENABLED" \
            "$ASSISTANT_LLM_BASE_URL" \
            "$ASSISTANT_LLM_MODEL" \
            "$ASSISTANT_FALLBACK_ENABLED" \
            "$ASSISTANT_FALLBACK_MODEL" \
            "$DEEPSEEK_API_KEY" \
            > "$ENV_FILE"

          # Create virtual environment and install dependencies
          echo "Installing dependencies..."
          cd "$BACKEND_DEPLOY_PATH/backend"
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --frozen

          if [ "$BACKEND_RUN_MIGRATIONS" = "true" ]; then
            uv run python scripts/migrate.py
          fi

          echo "Deployment completed successfully"

      - name: Restart service
        run: |
          sudo systemctl restart "$BACKEND_SERVICE"

      - name: Verify deployment
        run: |
          sleep 10
          sudo systemctl status "$BACKEND_SERVICE" --no-pager

      - name: Health check
        env:
          HEALTH_CHECK_URL: ${{ secrets.BACKEND_HEALTH_CHECK_URL }}
        run: |
          if [ -z "$HEALTH_CHECK_URL" ]; then
            exit 0
          fi
          sleep 5
          curl --fail --show-error --silent --location "$HEALTH_CHECK_URL" > /dev/null
