name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: true

env:
  FRONTEND_DEPLOY_PATH: ${{ secrets.FRONTEND_DEPLOY_PATH }}
  NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

jobs:
  deploy:
    name: Deploy frontend VM
    runs-on: [self-hosted, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: |
          test -n "$FRONTEND_DEPLOY_PATH"
          npm run lint
          npm run build

      - name: Deploy frontend build
        working-directory: frontend
        run: |
          echo "Deploying new build..."
          sudo rm -rf "$FRONTEND_DEPLOY_PATH"
          sudo mkdir -p "$FRONTEND_DEPLOY_PATH"
          sudo cp -a out/. "$FRONTEND_DEPLOY_PATH/"

          # Restart nginx to ensure changes take effect
          sudo systemctl restart nginx

          echo "DEV deployment completed successfully!"
